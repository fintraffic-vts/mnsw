<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>UN/LOCODE Port Areas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://fintraffic-vts.github.io/mnsw/nemo-dev.css">
  <style>
    .loading-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-height: 2rem;
      color: var(--muted, #506070);
    }

    .loading-spinner {
      width: 1rem;
      height: 1rem;
      border: 2px solid var(--line, #e5eef6);
      border-top-color: var(--brand-700, #0f5e8a);
      border-right-color: var(--brand-500, #2b8fc7);
      border-radius: 50%;
      animation: loading-spin 0.8s linear infinite;
      flex: 0 0 auto;
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--brand-700, #0f5e8a) 10%, transparent);
    }

    @keyframes loading-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body id="top">
  <main class="container">
    <header>
      <h1>UN/LOCODEs and National Port Areas</h1>
      <p>
        Listing of all UN/LOCODEs and available national port areas, berths,
        anchorages, and port facility codes loaded from JSON.
      </p>
      <p id="status" role="status" aria-live="polite">Loading data...</p>
    </header>

    <section aria-labelledby="navigation-heading">
      <h2 id="navigation-heading">Navigate by UN/LOCODE</h2>
      <input
        id="locodeFilter"
        type="text"
        placeholder="Filter UN/LOCODE..."
        aria-label="Filter UN/LOCODE"
      >
      <div id="navigation"></div>
    </section>

    <section aria-labelledby="content-heading">
      <h2 id="content-heading">Locations</h2>
      <div id="content"></div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
